<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | MUHYISSUNNA DARS UKKUDA Alumni</title>
    <link rel="stylesheet" href="./main.css?v=1.1">
    <link rel="icon" type="image/png" href="./favicon.png">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">MUHYISSUNNA DARS UKKUDA</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link" data-i18n="nav_home">Home</a>
                <a href="register.html" class="btn btn-primary" style="padding:0.55rem 1.2rem;" data-i18n="nav_register">Register</a>
            </div>
        </div>
    </nav>

    <main style="min-height:100vh; background:var(--bg-secondary); padding-top:72px; display:flex; align-items:center;">
        <div class="container section-padding" style="max-width:440px;">
            <div class="form-card animate-up">
                <div class="text-center mb-4">
                    <div class="bismillah" style="margin-bottom:0.5rem;">أَهْلاً وَسَهْلاً</div>
                    <div style="font-size:2.5rem; margin-bottom:0.75rem;">🕌</div>
                    <h1 style="font-size:2rem; margin-bottom:0.5rem; font-family:var(--font-serif);">Welcome Back</h1>
                    <p style="color:var(--text-secondary);">MUHYISSUNNA DARS UKKUDA Alumni Network</p>
                    <div class="gold-divider" style="max-width:160px; margin:0.75rem auto 0;"></div>
                </div>

                <form id="login-form" novalidate>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="login-email" class="form-input" placeholder="your@email.com" required
                            autofocus>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
                    </div>
                    <div class="d-flex justify-between align-center mb-2"
                        style="margin:0.5rem 0 1.5rem; font-size:0.85rem;">
                        <label
                            style="display:flex; align-items:center; gap:0.5rem; color:var(--text-secondary); cursor:pointer;">
                            <input type="checkbox" style="accent-color:var(--primary);"> Remember me
                        </label>
                        <a href="#" style="color:var(--primary); font-weight:500;">Forgot password?</a>
                    </div>

                    <div id="error-msg"
                        style="display:none; background:rgba(244,63,94,0.08); border:1px solid rgba(244,63,94,0.2); color:var(--accent); border-radius:var(--radius-md); padding:0.75rem 1rem; font-size:0.88rem; margin-bottom:1.25rem; text-align:center;">
                    </div>

                    <button type="submit" class="btn btn-primary btn-block btn-lg">Sign In</button>
                </form>

                <div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--border-color);">
                    <p style="text-align:center; font-size:0.9rem; color:var(--text-secondary);">Don't have an account?
                        <a href="register.html" style="color:var(--primary); font-weight:600;">Register here</a></p>
                    <div
                        style="margin-top:1.25rem; background:var(--bg-tertiary); padding:0.9rem 1.1rem; border-radius:var(--radius-md); border:1px solid var(--border-color);">
                        <p style="font-size:0.8rem; color:var(--text-muted); text-align:center;">Alumni must be approved
                            by admin after registration.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="./i18n.js"></script>
    <script src="./app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const session = App.getSession();
            if (session) {
                window.location.href = session.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
            }
            const form = document.getElementById('login-form');
            const errorMsg = document.getElementById('error-msg');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorMsg.style.display = 'none';
                const btn = e.target.querySelector('button[type="submit"]');
                const oldText = btn.textContent;
                btn.textContent = "Logging in...";
                btn.disabled = true;

                const email = document.getElementById('login-email').value.trim();
                const password = document.getElementById('login-password').value;
                if (!email || !password) {
                    errorMsg.textContent = 'Please fill in all fields.';
                    errorMsg.style.display = 'block';
                    btn.textContent = oldText;
                    btn.disabled = false;
                    return;
                }
                const result = await App.login(email, password);
                if (result.success) {
                    window.location.href = result.role === 'admin' ? 'admin.html' : 'dashboard.html';
                } else {
                    errorMsg.textContent = result.message || 'Invalid email or password.';
                    errorMsg.style.display = 'block';
                    btn.textContent = oldText;
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>

</html>
